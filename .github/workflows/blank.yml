name: Build Typstwriter EXE
on:
  push:
    branches: [ main ]
  workflow_dispatch:

jobs:
  build:
    runs-on: windows-latest
    steps:
      - name: Checkout build repo
        uses: actions/checkout@v4

      - name: Clone Typstwriter source
        run: git clone https://github.com/Bzero/typstwriter.git

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.10"

      - name: Install build tools
        run: |
          pip install flit "nuitka[onefile]" zstandard

      - name: Install dependencies via flit
        working-directory: typstwriter
        run: |
          $env:FLIT_ROOT_INSTALL=1
          flit install --deps=all

      - name: Download Dependency Walker (pre-approve)
        run: |
          python -m nuitka --version
          $depwalker_dir = "$env:APPDATA\Nuitka\Nuitka\Cache\downloads\depends\x86_64"
          New-Item -ItemType Directory -Force -Path $depwalker_dir
          curl -L "https://www.dependencywalker.com/depends22_x64.zip" -o depends.zip
          tar -xf depends.zip -C $depwalker_dir

      - name: Build Typstwriter EXE with Nuitka
        working-directory: typstwriter
        run: |
          python -m nuitka `
            --onefile `
            --assume-yes-for-downloads `
            --windows-disable-console `
            --enable-plugin=pyside6 `
            --include-package=qtpy `
            --include-package=pygments `
            --include-package=platformdirs `
            --include-package=qt_themes `
            typstwriter/typstwriter.py

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: typstwriter-windows
          path: typstwriter/typstwriter.exe
